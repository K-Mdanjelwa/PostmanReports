name: "Newman Tests" 
on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: postman/newman 
    steps:
      - name: Checkout  
        uses: actions/checkout@v2
        
      - name: Install Node 
        uses: actions/setup-node@v2
        with: 
          node-version: '25.x'
          
      - name: Install newman 
        run: |
          npm install -g newman 
          npm install -g newman-reporter-htmlextra 

      - name: Make Directory for results 
        run: mkdir -p testResults

      - name: Run API Tests 
        run: newman run "Restful Booker BVT.postman_collection.json" -e Production.postman_environment.json -r htmlextra --reporter-htmlextra-export testResult
        
      - name: Output the run Details
        uses: actions/upload-artifact@v4
        with:
          name: RunReports
          path: testResults
